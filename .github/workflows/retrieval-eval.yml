# Retrieval smoke gate (docs/EVALUATION.md §4). Indexes every benchmark repo — all
# six, each pinned to the commit in evals/repos.yaml so the golden span labels line
# up and the run is deterministic — then runs the retrieval-only ablation with
# --gate, failing the build if overall retrieval drops below the regression floor.
# No LLM generation/judging, so the only external cost is Voyage embeddings.
#
# The repo list is read from evals/repos.yaml at run time, so adding a benchmark
# repo there is automatically covered here (no second list to keep in sync).
#
# Needs the repo secret RA_VOYAGE_API_KEY. When it is absent (forks, or a repo
# where the secret hasn't been configured) the gate is skipped rather than failed,
# so the check stays green — the `check-secret` job gates the run.
name: Retrieval gate

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - "src/repo_assistant/retrieval/**"
      - "src/repo_assistant/chunking/**"
      - "src/repo_assistant/indexing/**"
      - "src/repo_assistant/parsing/**"
      - "src/repo_assistant/core/sparse.py"
      - "evals/**"

jobs:
  # A job-level `if:` cannot read `secrets`, so probe the secret here and expose
  # the result as an output the gate job can gate on.
  check-secret:
    runs-on: ubuntu-latest
    outputs:
      has-key: ${{ steps.probe.outputs.has-key }}
    steps:
      - id: probe
        env:
          RA_VOYAGE_API_KEY: ${{ secrets.RA_VOYAGE_API_KEY }}
        run: |
          if [ -n "$RA_VOYAGE_API_KEY" ]; then
            echo "has-key=true" >> "$GITHUB_OUTPUT"
          else
            echo "has-key=false" >> "$GITHUB_OUTPUT"
            echo "::notice::RA_VOYAGE_API_KEY secret not set — skipping the retrieval gate."
          fi

  retrieval-gate:
    needs: check-secret
    runs-on: ubuntu-latest
    if: >-
      needs.check-secret.outputs.has-key == 'true' &&
      (github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository)
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: repo_assistant
          POSTGRES_PASSWORD: repo_assistant
          POSTGRES_DB: repo_assistant
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U repo_assistant"
          --health-interval 5s --health-timeout 5s --health-retries 10
      qdrant:
        image: qdrant/qdrant:v1.15.1
        ports: ["6333:6333"]
    env:
      RA_VOYAGE_API_KEY: ${{ secrets.RA_VOYAGE_API_KEY }}
      RA_POSTGRES_DSN: postgresql+asyncpg://repo_assistant:repo_assistant@localhost:5432/repo_assistant
      RA_QDRANT_URL: http://localhost:6333
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - run: uv python install 3.12
      - run: uv sync --all-groups
      - run: uv run alembic upgrade head
      - name: Index benchmark repos (all, pinned from evals/repos.yaml)
        run: |
          uv run python - <<'PY'
          import subprocess, sys, yaml

          repos = yaml.safe_load(open("evals/repos.yaml"))["repos"]
          for r in repos:
              name, url, commit = r["name"], r["url"], r["commit"]
              print(f"::group::index {name} @ {commit[:12]}")
              result = subprocess.run(["uv", "run", "ra", "index", url, "--ref", commit])
              print("::endgroup::")
              if result.returncode != 0:
                  sys.exit(f"::error::indexing {name} ({url}@{commit}) failed")
          PY
      - name: Retrieval gate
        run: uv run ra eval --retrieval-only --gate
